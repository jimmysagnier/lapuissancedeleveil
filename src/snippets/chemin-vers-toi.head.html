    content:"";
    position:absolute;
    right:0;top:-3px;
    width:7px;height:7px;
    border-top:1px solid currentColor;
    border-right:1px solid currentColor;
    transform: rotate(45deg);
    transition: transform .5s var(--ease);
  }
  .offres .card-cta:hover .card-cta-arr{ width: 56px; }
  .offres .card-cta:hover .card-cta-arr::after{ transform: rotate(45deg) translate(2px,-2px); }
  /* balance — clarification sous les cartes */
  .of-balance{
    position:relative;z-index:2;
    margin: clamp(64px,7vw,96px) auto 0;
    max-width: 980px;
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    gap: clamp(20px,3vw,48px);
    align-items: stretch;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s var(--ease) .2s, transform 1.2s var(--ease) .2s;
  }
  .of-balance.is-on{ opacity:1; transform: translateY(0); }
  .offres .balance-cell{
    padding: clamp(20px,2vw,28px) clamp(20px,2.2vw,32px);
    text-align: center;
    position:relative;
  }
  .offres .balance-cell-lab{
    display:inline-flex;align-items:center;gap:10px;
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight:500;
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: clamp(12px,1.4vw,18px);
  }
  .offres .balance-cell-lab::before, .offres .balance-cell-lab::after{
    content:""; width:18px;height:1px;background:rgba(156,106,46,.4);
  }
  .offres .balance-cell-txt{
    font-family: var(--serif-it);
    font-style: italic;
    font-size: clamp(17px,1.5vw,21px);
    line-height: 1.45;
    color: var(--ink);
  }
  .offres .balance-cell-txt em{
    font-family: var(--serif-it);
    font-style: italic;
    color: var(--gold-deep);
  }
  .offres .balance-pivot{
    position:relative;
    width:1px;
    background: linear-gradient(180deg,
      rgba(200,145,75,0) 0%,
      rgba(200,145,75,.5) 30%,
      rgba(200,145,75,.5) 70%,
      rgba(200,145,75,0) 100%);
    align-self:stretch;
    justify-self: center;
  }
  .offres .balance-pivot::before{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width: 8px; height: 8px;
    background: var(--gold);
    transform: translate(-50%,-50%) rotate(45deg);
    box-shadow:
      0 0 0 4px var(--ivory),
      0 0 0 5px rgba(200,145,75,.3),
      0 0 18px rgba(200,145,75,.35);
  }
  /* responsive section 07 */
  @media (max-width: 1023px){
    .offres .of-grid{
      grid-template-columns: 1fr;
      gap: clamp(36px,8vw,60px);
    }
    .offres .card{ padding: clamp(28px,2.8vw,38px) clamp(22px,2.4vw,30px); }
    .offres .price-num{ font-size: clamp(38px,4.2vw,52px); }
    .offres .seuil{ display:none; }
    .offres .sceau{
      position:static;
      transform:none;
      display:flex;
      width:fit-content;
      margin: 0 auto clamp(14px,3vw,20px);
      padding: 6px 14px;
      background: var(--ivory);
      border:1px solid rgba(156,106,46,.3);
      font-size: 10.5px;
      letter-spacing: .36em;
    }
    .offres .card-wrap-revelation.is-on .sceau{ transform:none; }
    .offres .card.passage{ transform: translateY(20px); }
    .offres .card.passage.is-on{ transform: translateY(0); }
    .offres .card.revelation{ transform: translateY(20px); }
    .offres .card.revelation.is-on{ transform: translateY(0); }
    .offres .card-wrap-revelation::before{ inset: -16px -10px -8px -10px; }
  }
  @media (max-width: 760px){
    .of-title{ font-size:clamp(44px,11vw,72px); max-width:14ch; }
    .of-stage{ padding-top: 0; }
    .of-grid{
      grid-template-columns: 1fr;
      gap: clamp(36px,8vw,60px);
    }
    .offres .card.passage{ transform: translateY(20px); }
    .offres .card.passage.is-on{ transform: translateY(0); }
    .offres .card.revelation{ transform: translateY(20px); }
    .offres .card.revelation.is-on{ transform: translateY(0); }
    .offres .card-wrap-revelation::before{
      inset: -16px -10px -8px -10px;
    }
    .offres .seuil{ display:none; }
    .offres .sceau{
      position:static;
      transform:none;
      display:flex;
      width:fit-content;
      margin: 0 auto clamp(14px,3vw,20px);
      padding: 6px 14px;
      background: var(--ivory);
      border:1px solid rgba(156,106,46,.3);
    }
    .offres .card-wrap-revelation.is-on .sceau{ transform:none; }
    .of-balance{
      grid-template-columns: 1fr;
      gap: clamp(20px,4vw,28px);
    }
    .offres .balance-pivot{
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg,
        rgba(200,145,75,0) 0%,
        rgba(200,145,75,.5) 30%,
        rgba(200,145,75,.5) 70%,
        rgba(200,145,75,0) 100%);
      justify-self: stretch;
      min-height: 1px;
    }
  }
  @media (max-width: 480px){
    .offres{ padding: clamp(40px,8vw,64px) 18px clamp(64px,12vw,96px); }
    .offres .card-roman{ font-size: 28px; }
    .offres .card-title{ font-size: clamp(22px,6.4vw,26px); }
    .offres .price-num{ font-size: clamp(34px,9vw,42px); }
    .offres .balance-cell-txt{ font-size: 16px; }
  }
  /* prefers-reduced-motion section 07 */
  @media (prefers-reduced-motion: reduce){
    .of-folio .dot{ animation:none; }
    .offres .card-flag::before{ animation:none; }
    .of-eyebrow,.of-title,.of-balance{
      opacity:1 !important; transform:none !important; transition:none !important;
    }
    .offres .card.passage{
      opacity:1 !important;
      transform: translateX(0) !important;
      transition:none !important;
    }
    .offres .card.revelation{
      opacity:1 !important;
      transform: translateX(0) translateY(0) !important;
      transition:none !important;
    }
    .offres .card-wrap-revelation::before{ opacity:1 !important; transition:none !important; }
    .offres .seuil{ transform: scaleX(1) !important; transition:none !important; }
    .offres .sceau{ opacity:1 !important; transform: translateX(-50%) translateY(0) !important; transition:none !important; }
    @media (max-width:760px){
      .offres .sceau{ transform:none !important; }
    }
    .offres .card-cta-arr, .offres .card-cta-arr::after{ transition:none !important; }
  }
  /* ============================================================
     SECTION 08 — POURQUOI MOI
     Fond ink. Polaroid sticky cream mat sur fond profond, colonne
     récit aérée, charnières gold, manifeste italique signature.
  ============================================================ */
  .pq{
    position:relative;
    background:var(--ink);
    color:var(--ivory);
    padding:clamp(112px,13vw,180px) clamp(28px,5vw,80px) clamp(128px,15vw,200px);
    isolation:isolate;
  }
  .pq::before{
    content:"";
    position:absolute; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(46% 36% at 18% 28%, rgba(200,145,75,.10) 0%, rgba(200,145,75,0) 70%),
      radial-gradient(58% 44% at 82% 88%, rgba(194,84,58,.06) 0%, rgba(194,84,58,0) 70%);
  }
  .pq > *{ position:relative; z-index:2; }
  /* Folio */
  .pq-folio{
    display:flex; align-items:center; gap:14px;
    max-width:1280px; margin:0 auto clamp(64px,7vw,96px);
    font-family:var(--sans);
    font-size:10.5px; font-weight:500;
    letter-spacing:.42em; text-transform:uppercase;
    color:var(--gold);
    opacity:.92;
  }
  .pq-folio .dot{
    width:5px; height:5px; border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 0 4px rgba(200,145,75,.16);
    animation:pq-pulse 2.4s var(--ease) infinite;
  }
  .pq-folio .bar{ width:32px; height:1px; background:rgba(200,145,75,.36); }
  .pq-folio .lab{ color:rgba(243,236,223,.62); font-style:normal; }
  @keyframes pq-pulse{
    0%,100%{ opacity:.7; transform:scale(1); }
    50%   { opacity:1; transform:scale(1.18); }
  }
  /* Grille */
  .pq-grid{
    display:grid;
    grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
    gap:clamp(56px, 6vw, 96px);
    max-width:1280px;
    margin:0 auto;
  }
  /* Colonne photo : polaroid sticky */
  .pq-photo-col{ position:relative; }
  .pq-photo-wrap{
    position:sticky;
    top:clamp(96px, 12vh, 140px);
    height:calc(100vh - clamp(140px, 16vh, 200px));
    display:flex; align-items:center; justify-content:center;
  }
  .pq-photo{
    position:relative;
    width:100%;
    max-width:clamp(360px, 38vw, 520px);
    max-height:100%;
    transform:rotate(1.4deg);
    will-change:transform;
    opacity:0;
    transition:opacity 1.1s var(--ease), transform 1.1s var(--ease);
  }
  .pq-photo.is-on{ opacity:1; transform:rotate(1.4deg) translateY(0); }
  .pq-photo .mat{
    background:#FBF6EA;
    padding:clamp(14px, 1.6vw, 20px) clamp(14px, 1.6vw, 20px) clamp(48px, 5vw, 72px);
    border:1px solid rgba(243,236,223,.10);
    box-shadow:
      0 1px 2px rgba(0,0,0,.42),
      0 18px 42px rgba(0,0,0,.40),
      0 36px 80px -22px rgba(0,0,0,.55);
  }
  .pq-photo .frame{
    position:relative;
    overflow:hidden;
    aspect-ratio:4 / 5;
    background:var(--ink);
  }
  .pq-photo img,
  .pq-photo video{
    display:block;width:100%; height:100%;
    object-fit:cover;
    object-position:center 42%;
    filter:saturate(.96) contrast(1.04);
    will-change:transform;
    animation:pq-kb 24s var(--ease) infinite alternate;
  }
  .pq-photo video{animation:none}
  @keyframes pq-kb{
    0%   { transform:scale(1.00) translate3d(0,0,0); }
    100% { transform:scale(1.045) translate3d(.8%, -.6%, 0); }
  }
  .pq-photo-cap{
    position:absolute;
    left:clamp(20px, 1.8vw, 28px);
    bottom:clamp(18px, 2vw, 26px);
    font-family:var(--serif-it);
    font-style:italic;
    font-size:13px;
    color:var(--ink-soft);
    opacity:.62;
    letter-spacing:.005em;
  }
  .pq-photo .pin{
    position:absolute;
    top:-10px; left:50%;
    transform:translateX(-50%);
    width:10px; height:10px; border-radius:50%;
    background:var(--gold);
    box-shadow:
      0 0 0 3px rgba(200,145,75,.22),
      0 4px 10px rgba(0,0,0,.42);
  }
  /* Colonne texte */
  .pq-text-col{ padding-top:clamp(0px, 2vw, 24px); }
  .pq-eyebrow{
    font-family:var(--sans);
    font-size:13px; font-weight:700;
    letter-spacing:.42em; text-transform:uppercase;
    color:var(--gold);
    margin-bottom:clamp(20px, 2vw, 32px);
  }
  .pq-headline{
    font-family:var(--serif);
    font-weight:340;
    font-size:clamp(34px, 4.2vw, 60px);
    line-height:1.06;
    letter-spacing:-.018em;
    color:var(--ivory);
    font-variation-settings:"opsz" 144,"SOFT" 30,"WONK" 0;
    margin:0 0 clamp(28px, 3vw, 44px);
  }
  .pq-headline em{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:500;
    color:var(--gold);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  }
  .pq-lead{
    font-family:var(--serif);
    font-style:italic;
    font-weight:340;
    font-size:clamp(20px, 2vw, 28px);
    line-height:1.34;
    letter-spacing:-.006em;
    color:rgba(243,236,223,.84);
    font-variation-settings:"opsz" 144,"SOFT" 80,"WONK" 1;
    margin:0 0 clamp(28px, 3vw, 40px);
  }
  .pq-stanza{ margin-bottom:clamp(36px, 4vw, 56px); }
  .pq-stanza.tighter .pq-line{ margin-bottom:clamp(4px, .5vw, 8px); }
  .pq-line{
    font-family:var(--serif);
    font-weight:340;
    font-size:clamp(22px, 2.2vw, 30px);
    line-height:1.32;
    letter-spacing:-.008em;
    color:var(--ivory);
    font-variation-settings:"opsz" 144,"SOFT" 30,"WONK" 0;
    margin:0 0 clamp(10px, 1vw, 16px);
  }
  .pq-line:last-child{ margin-bottom:0; }
  .pq-line.cadence{
    font-size:clamp(20px, 1.95vw, 26px);
    color:rgba(243,236,223,.78);
  }
  .pq-line.vuln{
    font-family:var(--serif-it);
    font-style:italic;
    color:var(--gold);
    font-weight:500;
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  }
  .pq-line em,
  .pq-final em{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:500;
    color:var(--gold);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  }
  /* Charnière "Puis mon corps a dit stop." */
  .pq-charniere{
    font-family:var(--serif);
    font-weight:380;
    font-size:clamp(26px, 2.7vw, 36px);
    line-height:1.22;
    color:var(--ivory);
    margin:clamp(8px, 1vw, 16px) 0 clamp(28px, 3vw, 40px);
    font-variation-settings:"opsz" 144,"SOFT" 50,"WONK" 0;
  }
  .pq-charniere em{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:600;
    color:var(--terra);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
    background:linear-gradient(180deg, transparent 64%, rgba(194,84,58,.22) 64%);
    padding:0 .04em;
  }
  /* Filets gold */
  .pq-rule{
    display:block;
    width:clamp(40px, 4vw, 60px);
    height:1px;
    background:linear-gradient(90deg, var(--gold) 0%, rgba(200,145,75,0) 100%);
    margin:clamp(28px, 3.4vw, 44px) 0;
    transform-origin:left center;
    transform:scaleX(0);
    transition:transform 1s var(--ease);
  }
  .pq-rule.is-on{ transform:scaleX(1); }
  /* Reveals scoping section 08 */
  .pq [data-reveal]{
    opacity:0;
    transform:translateY(14px);
    transition:opacity 1.1s var(--ease), transform 1.1s var(--ease);
    transition-delay:var(--d, 0ms);
  }
  .pq [data-reveal].is-on{
    opacity:1;
    transform:translateY(0);
  }
  /* Citation forte (réalisation pivot) */
  .pq-quote{
    margin:clamp(28px, 3vw, 44px) 0;
    padding:clamp(20px, 2.4vw, 32px) clamp(22px, 2.6vw, 36px);
    border-left:1px solid var(--gold);
    background:linear-gradient(90deg, rgba(200,145,75,.07) 0%, rgba(200,145,75,0) 80%);
  }
  .pq-quote p{
    font-family:var(--serif);
    font-weight:340;
    font-size:clamp(22px, 2.4vw, 32px);
    line-height:1.26;
    letter-spacing:-.012em;
    color:var(--ivory);
    font-variation-settings:"opsz" 144,"SOFT" 50,"WONK" 0;
    margin:0 0 clamp(8px, 1vw, 14px);
  }
  .pq-quote p:last-child{ margin-bottom:0; }
  .pq-quote p em{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:500;
    color:var(--gold);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  }
  /* Liste déconstruction */
  .pq-list{
    list-style:none;
    margin:clamp(8px, 1vw, 14px) 0 0;
    padding:0;
    font-family:var(--serif);
    font-weight:340;
    font-size:clamp(20px, 2vw, 26px);
    line-height:1.32;
    color:rgba(243,236,223,.86);
  }
  .pq-list li{
    position:relative;
    padding-left:24px;
    margin-bottom:clamp(6px, .7vw, 10px);
  }
  .pq-list li:last-child{ margin-bottom:0; }
  .pq-list li::before{
    content:"";
    position:absolute;
    left:0; top:.65em;
    width:14px; height:1px;
    background:var(--gold);
    opacity:.75;
  }
  /* Bloc "Je t'aide à comprendre" */
  .pq-help{
    margin:clamp(20px, 2vw, 28px) 0 clamp(8px, 1vw, 14px);
    padding:clamp(28px, 3vw, 40px) clamp(24px, 2.6vw, 36px);
    background:rgba(243,236,223,.04);
    border-top:1px solid rgba(200,145,75,.32);
    border-bottom:1px solid rgba(200,145,75,.16);
    position:relative;
  }
  .pq-help::before{
    content:"";
    position:absolute;
    top:-1px; left:0;
    width:96px; height:1px;
    background:var(--gold);
  }
  .pq-help-lead{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:500;
    font-size:clamp(20px, 2vw, 26px);
    line-height:1.3;
    color:var(--gold);
    margin:0 0 clamp(14px, 1.6vw, 20px);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  }
  .pq-help-list{
    list-style:none;
    margin:0; padding:0;
    font-family:var(--serif);
    font-weight:340;
    font-size:clamp(19px, 1.85vw, 24px);
    line-height:1.36;
    color:var(--ivory);
  }
  .pq-help-list li{
    position:relative;
    padding-left:28px;
    margin-bottom:clamp(8px, .9vw, 12px);
  }
  .pq-help-list li:last-child{ margin-bottom:0; }
  .pq-help-list li::before{
    content:"—";
    position:absolute;
    left:0; top:0;
    color:var(--gold);
    font-family:var(--serif);
    opacity:.85;
  }
  .pq-help-list li em{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:500;
    color:var(--gold);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
  }
  /* Carte identité Manifestor */
  .pq-id{
    margin:clamp(28px, 3vw, 40px) 0;
    padding:clamp(20px, 2.4vw, 30px) clamp(24px, 2.8vw, 36px);
    border:1px solid rgba(200,145,75,.34);
    background:linear-gradient(180deg, rgba(200,145,75,.05) 0%, rgba(200,145,75,0) 100%);
    display:flex;
    flex-direction:column;
    gap:clamp(8px, 1vw, 14px);
    width:fit-content;
    max-width:100%;
  }
  .pq-id-mark{
    font-family:var(--sans);
    font-size:10.5px; font-weight:500;
    letter-spacing:.42em; text-transform:uppercase;
    color:var(--gold);
  }
  .pq-id-line{
    font-family:var(--serif);
    font-weight:380;
    font-size:clamp(22px, 2.2vw, 28px);
    line-height:1.2;
    color:var(--ivory);
    margin:0;
    font-variation-settings:"opsz" 96,"SOFT" 30,"WONK" 0;
  }
  .pq-id-line span{
    font-family:var(--serif-it);
    font-style:italic;
    color:var(--gold);
    font-variation-settings:"opsz" 96,"SOFT" 100,"WONK" 1;
  }
  .pq-id-note{
    font-family:var(--serif-it);font-style:italic;
    font-size:16px;line-height:1.45;letter-spacing:.005em;
    color:var(--ivory);
    margin:4px 0 0;
  }
  .pq-id-note::before{content:"* ";color:var(--gold);font-style:normal;}
  /* Promesse finale + signature */
  .pq-final{
    font-family:var(--serif);
    font-weight:340;
    font-size:clamp(24px, 2.6vw, 34px);
    line-height:1.24;
    letter-spacing:-.012em;
    color:rgba(243,236,223,.74);
    margin:clamp(28px, 3vw, 44px) 0 clamp(16px, 2vw, 24px);
    font-variation-settings:"opsz" 144,"SOFT" 50,"WONK" 0;
  }
  .pq-signature{
    font-family:var(--serif);
    font-weight:380;
    font-size:clamp(28px, 3.4vw, 46px);
    line-height:1.16;
    letter-spacing:-.018em;
    color:var(--ivory);
    margin:0;
    font-variation-settings:"opsz" 144,"SOFT" 70,"WONK" 0;
  }
  .pq-signature em{
    font-family:var(--serif-it);
    font-style:italic;
    font-weight:600;
    color:var(--gold);
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
    background:linear-gradient(180deg, transparent 66%, rgba(200,145,75,.20) 66%);
    padding:0 .04em;
  }
  /* CTA "Réserve ton appel découverte" — fond ink, texte ivoire */
  .pq-cta{
    display:inline-flex;align-items:center;gap:18px;
    margin-top:clamp(40px,5vw,72px);
    padding:0 0 12px;background:transparent;border:0;
    color:var(--ivory);
    font-family:var(--serif);font-weight:400;
    font-size:clamp(18px,1.5vw,22px);
    line-height:1;letter-spacing:-.005em;
    cursor:pointer;text-decoration:none;
    position:relative;
    font-variation-settings:"opsz" 72,"SOFT" 60,"WONK" 0;
    transition:transform .55s var(--ease), color .35s var(--ease);
  }
  .pq-cta::before{
    content:"";position:absolute;left:0;bottom:0;
    width:100%;height:1px;background:rgba(243,236,223,.34);
  }
  .pq-cta::after{
    content:"";position:absolute;left:0;bottom:0;
